<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>출타 관리 시스템</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color"
          content="#10b981">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 출타 종류별 고유 색상 스키마 */
        .color-weekday { background-color: #3b82f6 !important; }
        .color-weekend { background-color: #1e3a8a !important; }
        .color-overnight { background-color: #10b981 !important; }
        .color-vacation { background-color: #ef4444 !important; }

        /* 모든 출타 공통 줄 바(Bar) 스타일 */
        .schedule-bar {
            height: 14px;
            font-size: 10px;
            color: white !important;
            font-weight: 800;
            text-align: center;
            line-height: 14px; 
            overflow: hidden;
            white-space: nowrap;
            position: relative;
        }

        /* 띠로 이어지게 만드는 시각 튜닝 클래스 */
        .bar-single { border-radius: 4px; margin-left: 2px; margin-right: 2px; }
        .bar-start { border-top-left-radius: 4px; border-bottom-left-radius: 4px; margin-left: 2px; margin-right: -4px; }
        .bar-mid { border-radius: 0; margin-left: -4px; margin-right: -4px; }
        .bar-end { border-top-right-radius: 4px; border-bottom-right-radius: 4px; margin-left: -4px; margin-right: 2px; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased relative">

    <button
        id="installButton"
        class="hidden fixed bottom-5 right-5 bg-emerald-600 text-white px-5 py-3 rounded-full shadow-lg font-bold z-50 active:scale-95 transition-all">
        📱 앱 설치
    </button>

    <div id="toast-alert" onclick="dismissToast()" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-[999] bg-gray-900/95 text-white text-sm font-bold px-6 py-4 rounded-2xl shadow-2xl border border-gray-700 cursor-pointer pointer-events-none opacity-0 invisible transition-all duration-300 max-w-xs text-center backdrop-blur-xs">
        <span id="toast-message">경고 메시지</span>
        <div class="text-[11px] text-gray-400 mt-2 font-normal">(터치 시 즉시 해제)</div>
    </div>

    <div id="delete-confirm-modal" class="fixed inset-0 bg-black/40 z-[999] flex items-center justify-center p-4 hidden">
        <div class="bg-white w-full max-w-xs rounded-2xl p-5 shadow-2xl space-y-4 text-center">
            <p id="delete-confirm-msg" class="text-sm font-bold text-gray-800 break-all">누구의 출타를 삭제하시겠습니까?</p>
            <div class="grid grid-cols-2 gap-3 pt-2">
                <button onclick="closeDeleteModal(false)" class="py-2.5 bg-gray-100 text-gray-600 rounded-xl font-bold text-xs active:scale-95 transition-all">아니오</button>
                <button onclick="closeDeleteModal(true)" class="py-2.5 bg-red-600 text-white rounded-xl font-bold text-xs active:scale-95 transition-all shadow-xs">예</button>
            </div>
        </div>
    </div>

    <div id="page-status" class="max-w-md mx-auto min-h-screen flex flex-col">
        <header class="bg-white border-b border-gray-200 px-4 py-3 flex items-center sticky top-0 z-10">

            <div class="w-24"></div>

            <h2 class="flex-1 text-center text-lg font-bold tracking-tight">
                출타 관리 시스템
            </h2>

            <div class="w-24 flex justify-end">
                <button onclick="openModal()"
                    class="px-3 py-1.5 bg-emerald-600 text-white font-bold rounded-xl text-xs active:scale-95 transition-all shadow-xs">
                    출타 등록
                </button>
            </div>

        </header>

        <div class="flex items-center justify-between p-3 bg-white border-b border-gray-100 gap-2">
            <nav class="grid grid-cols-2 gap-1.5 flex-1">
                <button id="btn-tab-calendar" onclick="switchViewTab('calendar')" class="py-2 rounded-xl font-bold text-xs text-center transition-all bg-blue-600 text-white shadow-xs">달력 보기</button>
                <button id="btn-tab-list" onclick="switchViewTab('list')" class="py-2 rounded-xl font-bold text-xs text-center transition-all bg-gray-100 text-gray-600">상세 일정</button>
            </nav>
            <button id="btn-delete-mode" onclick="toggleDeleteMode()" class="w-1/4 py-2 rounded-xl font-bold text-xs text-center transition-all bg-red-600 text-white shadow-xs active:scale-95">
                삭제모드
            </button>
        </div>

        <main class="p-4 flex-1">
            <section id="view-calendar" class="block">
                <div class="flex justify-between items-center mb-4">
                    <div class="flex items-center space-x-3">
                        <button onclick="changeMonth(-1)" class="p-2 font-bold text-lg hover:bg-gray-200 rounded-full w-8 h-8 flex items-center justify-center">&lt;</button>
                        <span id="calendar-title" class="text-lg font-bold text-gray-800">2026년 06월</span>
                        <button onclick="changeMonth(1)" class="p-2 font-bold text-lg hover:bg-gray-200 rounded-full w-8 h-8 flex items-center justify-center">&gt;</button>
                    </div>
                </div>

                <div class="flex flex-wrap gap-x-3 gap-y-1 text-xs font-semibold text-gray-500 mb-3 bg-gray-100 p-2 rounded-lg">
                    <span class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded-full color-weekday"></span>평일외출</span>
                    <span class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded-full color-weekend"></span>주말외출</span>
                    <span class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded-full color-overnight"></span>외박</span>
                    <span class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded-full color-vacation"></span>휴가</span>
                </div>

                <div class="bg-white rounded-2xl p-3 shadow-xs border border-gray-200 overflow-hidden">
                    <div class="grid grid-cols-7 text-center text-xs font-bold text-gray-400 mb-2 border-b border-gray-100 pb-2">
                        <div class="text-red-500">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div class="text-blue-600">토</div>
                    </div>
                    <div id="calendar-grid" class="grid grid-cols-7 gap-y-2 text-sm"></div>
                </div>
            </section>

            <section id="view-list" class="hidden space-y-6">
                <div>
                    <h3 class="font-extrabold text-emerald-700 text-sm mb-2 flex items-center gap-1">
                        <span class="inline-block w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                        &lt;오늘의 출타&gt;
                    </h3>
                    <div id="today-list" class="space-y-2"></div>
                </div>
                
                <hr class="border-gray-200">

                <div>
                    <h3 class="font-bold text-gray-700 mb-3 text-sm">전체 출타 정보 명단</h3>
                    <div id="integrated-list" class="space-y-2"></div>
                </div>
            </section>
        </main>
    </div>


    <div id="register-modal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white w-full max-w-sm rounded-2xl p-5 shadow-2xl space-y-4">
            <div class="flex justify-between items-center border-b border-gray-100 pb-2">
                <h3 class="text-lg font-bold text-gray-900">새 출타 등록</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-xl font-bold">&times;</button>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-500 mb-1">출타자 이름</label>
                <input type="text" id="input-name" placeholder="이름을 입력하세요" class="w-full px-3 py-2 border border-gray-300 rounded-xl text-sm focus:outline-hidden focus:border-emerald-600">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-500 mb-1">출타 형태</label>
                <div class="grid grid-cols-2 gap-2 text-xs">
                    <label class="flex items-center gap-2 p-2 border border-gray-200 rounded-lg cursor-pointer hover:bg-gray-50">
                        <input type="checkbox" name="type-group" value="weekday" onclick="handleCheckbox(this)" class="accent-blue-600"> 평일외출
                    </label>
                    <label class="flex items-center gap-2 p-2 border border-gray-200 rounded-lg cursor-pointer hover:bg-gray-50">
                        <input type="checkbox" name="type-group" value="weekend" onclick="handleCheckbox(this)" class="accent-indigo-900"> 주말외출
                    </label>
                    <label class="flex items-center gap-2 p-2 border border-gray-200 rounded-lg cursor-pointer hover:bg-gray-50">
                        <input type="checkbox" name="type-group" value="overnight" onclick="handleCheckbox(this)" class="accent-emerald-600"> 외박
                    </label>
                    <label class="flex items-center gap-2 p-2 border border-gray-200 rounded-lg cursor-pointer hover:bg-gray-50">
                        <input type="checkbox" name="type-group" value="vacation" onclick="handleCheckbox(this)" class="accent-red-500"> 휴가
                    </label>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-500 mb-1">출타 기간 설정</label>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <span class="text-[10px] text-gray-400 block">시작일(출발일)</span>
                        <input type="date" id="input-start-date" onchange="syncStartDate(this.value)" class="w-full p-2 border border-gray-300 rounded-lg text-xs">
                    </div>
                    <div class="relative" onclick="handleEndDateClick(event)">
                        <span class="text-[10px] text-gray-400 block">종료일(도착일)</span>
                        <input type="date" id="input-end-date" class="w-full p-2 border border-gray-300 rounded-lg text-xs disabled:bg-gray-100 disabled:text-gray-400 disabled:cursor-not-allowed">
                    </div>
                </div>
            </div>

            <div class="flex gap-2 pt-2">
                <button onclick="closeModal()" class="flex-1 py-2.5 bg-gray-100 text-gray-600 rounded-xl font-bold text-sm">취소</button>
                <button onclick="submitRegistration()" class="flex-1 py-2.5 bg-emerald-600 text-white rounded-xl font-bold text-sm shadow-xs">등록 완료</button>
            </div>
        </div>
    </div>


    <script>

        const SUPABASE_URL = "https://xlfgksvxqnqvhihfhjfe.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_JX_fqNLdAEbTFmBvDhgrWA_6Z74Gu0r";

        const sb = window.supabase.createClient(
            SUPABASE_URL,
            SUPABASE_ANON_KEY
        );

        let outData = [];
        let currentYear = 2026;
        let currentMonth = 5; 
        let isDeleteMode = false; 
        let selectedIndexToDelete = null;

        let toastQueue = [];
        let isToastActive = false;
        let toastTimer = null;

        function getTodayString() {
            const d = new Date();
            return d.getFullYear() + "-"
                + String(d.getMonth() + 1).padStart(2, "0") + "-"
                + String(d.getDate()).padStart(2, "0");
        }

        async function loadData(){
            const {data,error}=await sb
                .from("outing")
                .select("*")
                .order("start");
            if(error){
                console.error(error);
                return;
            }
            outData=data;
        }

        async function autoPurgeExpiredData() {
            const todayStr = getTodayString();
            await sb
                .from("outing")
                .delete()
                .lt("end", todayStr);
            await loadData();
        }

        function triggerToast(message) {
            toastQueue.push(message);
            processToastQueue();
        }

        function processToastQueue() {
            if (isToastActive || toastQueue.length === 0) return;
            isToastActive = true;

            const message = toastQueue.shift();
            const toast = document.getElementById('toast-alert');
            const msgSpan = document.getElementById('toast-message');
            
            msgSpan.innerText = message;
            toast.classList.remove('opacity-0', 'invisible', 'pointer-events-none');
            toast.classList.add('opacity-100');
            
            toastTimer = setTimeout(() => { dismissToast(); }, 3000);
        }

        function dismissToast() {
            const toast = document.getElementById('toast-alert');
            toast.classList.remove('opacity-100');
            toast.classList.add('opacity-0');
            
            clearTimeout(toastTimer);
            
            setTimeout(() => {
                if(toast.classList.contains('opacity-0')) {
                    toast.classList.add('invisible', 'pointer-events-none');
                }
                isToastActive = false;
                setTimeout(() => { processToastQueue(); }, 100);
            }, 300);
        }

        // 삭제 모드 토글 함수 (삭제모드 작동 시 상세일정 탭으로 자동 이동 설계 포함)
        function toggleDeleteMode() {
            const btn = document.getElementById('btn-delete-mode');
            isDeleteMode = !isDeleteMode;

            if (isDeleteMode) {
                btn.innerText = "기본모드";
                btn.className = "w-1/4 py-2 rounded-xl font-bold text-xs text-center transition-all bg-emerald-600 text-white shadow-xs active:scale-95";
                // 삭제 모드가 켜지면 자동으로 상세 일정 탭으로 화면 전환
                switchViewTab('list');
            } else {
                btn.innerText = "삭제모드";
                btn.className = "w-1/4 py-2 rounded-xl font-bold text-xs text-center transition-all bg-red-600 text-white shadow-xs active:scale-95";
                renderListTab(); 
            }
        }

        function requestDeleteCard(index, name) {
            if (!isDeleteMode) return;
            selectedIndexToDelete = index;
            document.getElementById('delete-confirm-msg').innerText = `<${name}>의 출타를 삭제하시겠습니까?`;
            document.getElementById('delete-confirm-modal').classList.remove('hidden');
        }

        async function closeDeleteModal(confirm) {
            document.getElementById('delete-confirm-modal').classList.add('hidden');
            if (confirm && selectedIndexToDelete !== null) {
                const id=outData[selectedIndexToDelete].id;
                await sb
                .from("outing")
                .delete()
                .eq("id",id);

                await loadData();
                triggerToast('해당 출타 기록이 완전히 삭제되었습니다.');
                autoPurgeExpiredData();
                renderCalendar();
                renderListTab();
            }
            selectedIndexToDelete = null;
        }

        function switchViewTab(viewType) {
            const btnCalendar = document.getElementById('btn-tab-calendar');
            const btnList = document.getElementById('btn-tab-list');
            const viewCalendar = document.getElementById('view-calendar');
            const viewList = document.getElementById('view-list');

            if(viewType === 'calendar') {
                // 달력 보기를 누를 때 삭제 모드 상태라면 기본 모드로 강제 원복
                if(isDeleteMode) {
                    isDeleteMode = false;
                    const btn = document.getElementById('btn-delete-mode');
                    btn.innerText = "삭제모드";
                    btn.className = "w-1/4 py-2 rounded-xl font-bold text-xs text-center transition-all bg-red-600 text-white shadow-xs active:scale-95";
                }
                btnCalendar.className = 'py-2 rounded-xl font-bold text-xs text-center transition-all bg-blue-600 text-white shadow-xs';
                btnList.className = 'py-2 rounded-xl font-bold text-xs text-center transition-all bg-gray-100 text-gray-600';
                viewCalendar.classList.remove('hidden'); viewList.classList.add('hidden');
                autoPurgeExpiredData();
                renderCalendar();
            } else {
                btnCalendar.className = 'py-2 rounded-xl font-bold text-xs text-center transition-all bg-gray-100 text-gray-600';
                btnList.className = 'py-2 rounded-xl font-bold text-xs text-center transition-all bg-blue-600 text-white shadow-xs';
                viewCalendar.classList.add('hidden'); viewList.classList.remove('hidden');
                autoPurgeExpiredData();
                renderListTab();
            }
        }

        function openModal() { 
            document.getElementById('register-modal').classList.remove('hidden');
            document.getElementById('input-start-date').value = getTodayString();
        }
        function closeModal() { document.getElementById('register-modal').classList.add('hidden'); clearForm(); dismissToast(); }

        function handleCheckbox(checkbox) {
            const checkboxes = document.getElementsByName('type-group');
            checkboxes.forEach((item) => { if (item !== checkbox) item.checked = false; });

            const endDateInput = document.getElementById('input-end-date');
            const startDateValue = document.getElementById('input-start-date').value;

            if (checkbox.checked) {
                if (checkbox.value === 'weekday' || checkbox.value === 'weekend') {
                    endDateInput.disabled = true;
                    if (startDateValue) {
                        endDateInput.value = startDateValue;
                        if(checkbox.value === 'weekday') validateWeekdayDate(startDateValue);
                        if(checkbox.value === 'weekend') validateWeekendOrOvernightDate('weekend', startDateValue);
                    }
                } else if (checkbox.value === 'overnight') {
                    endDateInput.disabled = true;
                    if (startDateValue) {
                        endDateInput.value = getNextDateString(startDateValue);
                        validateWeekendOrOvernightDate('overnight', startDateValue);
                    }
                } else {
                    endDateInput.disabled = false;
                }
            } else {
                endDateInput.disabled = false;
            }
        }

        function getNextDateString(dateStr) {
            const parts = dateStr.split('-');
            const date = new Date(parts[0], parts[1] - 1, parts[2]);
            date.setDate(date.getDate() + 1);
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        }

        function validateWeekdayDate(dateVal) {
            if(!dateVal) return true;
            const parts = dateVal.split('-');
            const dayOfWeek = new Date(parts[0], parts[1] - 1, parts[2]).getDay();
            if (dayOfWeek === 0 || dayOfWeek === 6) {
                triggerToast('평일외출은 평일에만 나갈 수 있습니다.');
                return false;
            }
            return true;
        }

        function validateWeekendOrOvernightDate(type, dateVal) {
            if(!dateVal) return;
            const parts = dateVal.split('-');
            const dayOfWeek = new Date(parts[0], parts[1] - 1, parts[2]).getDay();

            if (type === 'weekend') {
                if (dayOfWeek !== 0 && dayOfWeek !== 6) {
                    triggerToast('외출일이 주말이 아닙니다. 확인해주시기 바랍니다.');
                }
            } else if (type === 'overnight') {
                if (dayOfWeek !== 6) {
                    triggerToast('외박일이 주말이 아닙니다, 확인해주시기 바랍니다.');
                }
            }
        }

        function syncStartDate(val) {
            if (!val) return;
            const checkedType = document.querySelector('input[name="type-group"]:checked');
            const endDateInput = document.getElementById('input-end-date');
            
            if (checkedType) {
                if (checkedType.value === 'weekday') {
                    endDateInput.value = val;
                    validateWeekdayDate(val);
                } else if (checkedType.value === 'weekend') {
                    endDateInput.value = val;
                    validateWeekendOrOvernightDate('weekend', val);
                } else if (checkedType.value === 'overnight') {
                    endDateInput.value = getNextDateString(val);
                    validateWeekendOrOvernightDate('overnight', val);
                }
            }
        }

        function handleEndDateClick(e) {
            const endDateInput = document.getElementById('input-end-date');
            const checkedType = document.querySelector('input[name="type-group"]:checked');
            
            if (endDateInput.disabled && checkedType) {
                e.preventDefault();
                if (checkedType.value === 'weekday' || checkedType.value === 'weekend') {
                    triggerToast('외출은 하루만 나갈 수 있습니다.');
                } else if (checkedType.value === 'overnight') {
                    triggerToast('외박은 1박 2일만 설정 가능하여 종료일이 고정됩니다.');
                }
            }
        }

        function changeMonth(direction) {
            currentMonth += direction;
            if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            else if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            renderCalendar();
        }

        // 초기 구동 자동화 실행문
        window.onload = async function(){
            await loadData();
            autoPurgeExpiredData();
            renderCalendar();
            renderListTab();
            subscribeRealtime();

        };

        function clearForm() {
            document.getElementById('input-name').value = '';
            document.getElementsByName('type-group').forEach(cb => cb.checked = false);
            document.getElementById('input-start-date').value = '';
            const endDate = document.getElementById('input-end-date');
            endDate.value = '';
            endDate.disabled = false;
        }

        async function submitRegistration() {
            const name = document.getElementById('input-name').value.trim();
            const checkedType = document.querySelector('input[name="type-group"]:checked');
            const startDate = document.getElementById('input-start-date').value;
            const endDate = document.getElementById('input-end-date').value;

            if(!name || !checkedType || !startDate || !endDate) {
                alert('모든 입력 항목을 빠짐없이 채워주세요.');
                return;
            }
            
            if(new Date(startDate) > new Date(endDate)) {
                triggerToast('도착일은 출발일보다 늦어야 합니다.');
                return;
            }

            if(checkedType.value === 'weekday' && !validateWeekdayDate(startDate)) return;

            const {error}=await sb
            .from("outing")
            .insert([{
                name:name,
                type:checkedType.value,
                start:startDate,
                end:endDate
            }]);
            if(error){
                alert(error.message);
                return;
            }

            await loadData();
            closeModal();
            
            autoPurgeExpiredData();
            renderCalendar();
            renderListTab();

            triggerToast('출타가 등록되었습니다.');
        }

        function renderCalendar() {
            autoPurgeExpiredData(); 
            const grid = document.getElementById('calendar-grid');
            const title = document.getElementById('calendar-title');
            grid.innerHTML = '';
            
            title.innerText = `${currentYear}년 ${String(currentMonth + 1).padStart(2, '0')}월`;

            const firstDayIndex = new Date(currentYear, currentMonth, 1).getDay();
            const lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();
            const prevLastDate = new Date(currentYear, currentMonth, 0).getDate();

            for(let i = firstDayIndex; i > 0; i--) {
                const dayDiv = document.createElement('div');
                dayDiv.className = 'text-gray-300 min-h-[85px] p-1 border-t border-gray-100 select-none';
                dayDiv.innerText = prevLastDate - i + 1;
                grid.appendChild(dayDiv);
            }

            for(let date = 1; date <= lastDate; date++) {
                const dayDiv = document.createElement('div');
                dayDiv.className = 'min-h-[85px] p-1 border-t border-gray-100 flex flex-col justify-between';
                
                const dateNo = document.createElement('div');
                dateNo.className = 'font-semibold text-xs text-left mb-1 px-1';
                dateNo.innerText = date;
                
                const currentDayOfWeek = new Date(currentYear, currentMonth, date).getDay();
                if(currentDayOfWeek === 0) dateNo.classList.add('text-red-500');
                if(currentDayOfWeek === 6) dateNo.classList.add('text-blue-600');
                
                dayDiv.appendChild(dateNo);

                const checkStr = `${currentYear}-${String(currentMonth+1).padStart(2, '0')}-${String(date).padStart(2, '0')}`;
                let todaysOutings = outData.filter(item => checkStr >= item.start && checkStr <= item.end);
                
                const priority = { weekday: 1, weekend: 2, overnight: 3, vacation: 4 };
                todaysOutings.sort((a, b) => priority[a.type] - priority[b.type]);

                const barContainer = document.createElement('div');
                barContainer.className = 'flex-1 flex flex-col gap-1 justify-start pt-1 pb-1';

                todaysOutings.forEach(item => {
                    const bar = document.createElement('div');
                    bar.className = `schedule-bar color-${item.type}`;
                    
                    if (item.type === 'weekday' || item.type === 'weekend' || checkStr === item.start || currentDayOfWeek === 0) {
                        bar.innerText = item.name;
                    }

                    if (item.start === item.end || item.type === 'weekday' || item.type === 'weekend') {
                        bar.classList.add('bar-single');
                    } else {
                        if (checkStr === item.start) {
                            bar.classList.add('bar-start');
                        } else if (checkStr === item.end) {
                            bar.classList.add('bar-end');
                        } else {
                            if (currentDayOfWeek === 0) bar.classList.add('bar-start');
                            else if (currentDayOfWeek === 6) bar.classList.add('bar-end');
                            else bar.classList.add('bar-mid');
                        }
                    }
                    barContainer.appendChild(bar);
                });

                dayDiv.appendChild(barContainer);
                grid.appendChild(dayDiv);
            }
        }

        function renderListTab() {
            autoPurgeExpiredData(); 
            
            const todayContainer = document.getElementById('today-list');
            const integratedContainer = document.getElementById('integrated-list');
            
            todayContainer.innerHTML = '';
            integratedContainer.innerHTML = '';

            const todayStr = getTodayString();
            const typeBgClasses = { weekday:'color-weekday', weekend:'color-weekend', overnight:'color-overnight', vacation:'color-vacation' };

            let todayElementsCount = 0;
            outData.forEach((item, index) => {
                let statusLabel = '';
                if (item.type === 'vacation') {
                    if (item.start === todayStr) statusLabel = '휴가출발';
                    else if (item.end === todayStr) statusLabel = '휴가복귀';
                } else if (item.type === 'overnight') {
                    if (item.start === todayStr) statusLabel = '외박출발';
                    else if (item.end === todayStr) statusLabel = '외박복귀';
                } else if (item.type === 'weekday' && item.start === todayStr) {
                    statusLabel = '평일외출';
                } else if (item.type === 'weekend' && item.start === todayStr) {
                    statusLabel = '주말외출';
                }

                if (statusLabel) {
                    todayElementsCount++;
                    
                    const modeStyle = isDeleteMode 
                        ? 'border-2 border-dashed border-red-500 cursor-pointer bg-red-50/70 hover:bg-red-100/80 transition-all' 
                        : 'border-2 border-transparent bg-amber-50';

                    todayContainer.innerHTML += `
                        <div onclick="requestDeleteCard(${index}, '${item.name}')" class="${modeStyle} p-3.5 rounded-xl shadow-xs flex justify-between items-center text-sm">
                            <div>
                                <p class="font-bold text-gray-900 text-base">${item.name}</p>
                                <p class="text-[11px] text-gray-500 mt-0.5">기간: ${item.start} ~ ${item.end}</p>
                            </div>
                            <span class="px-3 py-1 rounded-lg text-xs font-black text-white ${typeBgClasses[item.type]}" style="color: #ffffff !important;">
                                ${statusLabel}
                            </span>
                        </div>`;
                }
            });

            if (todayElementsCount === 0) {
                todayContainer.innerHTML = `<div class="text-center py-4 text-xs text-gray-400 bg-gray-50 rounded-xl border-2 border-dashed border-gray-200">오늘 변동되는 출타자가 없습니다.</div>`;
            }

            if(outData.length === 0) {
                integratedContainer.innerHTML = `<div class="text-center py-12 text-sm text-gray-400">현재 등록된 출타 이력이 없습니다.</div>`;
                return;
            }

            const indexedData = outData.map((item, idx) => ({...item, originalIndex: idx}));
            indexedData.sort((a, b) => new Date(a.start) - new Date(b.start));

            const typeNames = { weekday:'평일외출', weekend:'주말외출', overnight:'외박', vacation:'휴가' };

            indexedData.forEach(item => {
                const modeStyle = isDeleteMode 
                    ? 'border-2 border-dashed border-red-500 cursor-pointer bg-red-50/70 hover:bg-red-100/80 transition-all' 
                    : 'border-2 border-transparent bg-white shadow-xs';

                integratedContainer.innerHTML += `
                    <div onclick="requestDeleteCard(${item.originalIndex}, '${item.name}')" class="${modeStyle} p-4 rounded-xl flex justify-between items-center text-sm">
                        <div>
                            <p class="font-bold text-gray-900 text-base">${item.name}</p>
                            <p class="text-xs text-gray-500 mt-1">기간: ${item.start} ~ ${item.end}</p>
                        </div>
                        <span class="px-3 py-1 rounded-lg text-xs font-black text-white ${typeBgClasses[item.type]}" style="color: #ffffff !important;">
                            ${typeNames[item.type]}
                        </span>
                    </div>`;
            });
        }

        function subscribeRealtime() {
            sb
                .channel("outing-channel")
                .on(
                    "postgres_changes",
                    {
                        event: "*",
                        schema: "public",
                        table: "outing"
                    },
                    async () => {
                        await loadData();
                        renderCalendar();
                        renderListTab();
                    }
                )
                .subscribe();
        }
    </script>

    <script>

    let deferredPrompt = null;
    const installButton = document.getElementById("installButton");
    function isStandalone() {
        return window.matchMedia("(display-mode: standalone)").matches
            || window.navigator.standalone === true;
    }

    function isIOS() {
        return /iphone|ipad|ipod/i.test(navigator.userAgent);
    }
    window.addEventListener("beforeinstallprompt", (e) => {
        e.preventDefault();
        deferredPrompt = e;
        if (!isStandalone()) {
            installButton.classList.remove("hidden");
        }

    });


    installButton.addEventListener("click", async () => {

        if (isIOS()) {

            alert(
    `아이폰에서는
    Safari 하단의 공유, '홈 화면에 추가'
    를 눌러 설치할 수 있습니다.`
            );
            return;
        }
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
        deferredPrompt = null;
    });

    window.addEventListener("appinstalled", () => {
        installButton.classList.add("hidden");
        console.log("앱 설치 완료");
    });
    // 처음 실행 시
    window.addEventListener("load", () => {
        if (isStandalone()) {
            installButton.classList.add("hidden");
        }
    });

    installButton.addEventListener("click", async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === "accepted") {
            console.log("앱 설치 완료");
        }

        deferredPrompt = null;
        installButton.classList.add("hidden");
    });

    window.addEventListener("appinstalled", () => {
        console.log("설치 완료");
        installButton.classList.add("hidden");
    });

    </script>

    <script>
    if ("serviceWorker" in navigator) {
        window.addEventListener("load", async () => {
            const registration = await navigator.serviceWorker.register("./service-worker.js");
            console.log("Service Worker 등록 완료");
            registration.addEventListener("updatefound", () => {
                const newWorker = registration.installing;
                newWorker.addEventListener("statechange", () => {
                    if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
                        if (confirm("새 버전이 있습니다.\n지금 업데이트하시겠습니까?")) {
                            window.location.reload();
                        }
                    }
                });
            });
        });
    }
    </script>
