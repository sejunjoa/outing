<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>м¶ңнғҖ кҙҖлҰ¬ мӢңмҠӨн…ң</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color"
          content="#10b981">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* м¶ңнғҖ мў…лҘҳлі„ кі мң  мғүмғҒ мҠӨнӮӨл§Ҳ */
        .color-weekday { background-color: #3b82f6 !important; }
        .color-weekend { background-color: #1e3a8a !important; }
        .color-overnight { background-color: #10b981 !important; }
        .color-vacation { background-color: #ef4444 !important; }

        /* лӘЁл“  м¶ңнғҖ кіөнҶө мӨ„ л°”(Bar) мҠӨнғҖмқј */
        .schedule-bar {
            height: 14px;
            font-size: 10px;
            color: white !important;
            font-weight: 800;
            text-align: center;
            line-height: 14px; 
            overflow: hidden;
            white-space: nowrap;
            position: relative;
        }

        /* лқ лЎң мқҙм–ҙм§ҖкІҢ л§Ңл“ңлҠ” мӢңк°Ғ нҠңлӢқ нҒҙлһҳмҠӨ */
        .bar-single { border-radius: 4px; margin-left: 2px; margin-right: 2px; }
        .bar-start { border-top-left-radius: 4px; border-bottom-left-radius: 4px; margin-left: 2px; margin-right: -4px; }
        .bar-mid { border-radius: 0; margin-left: -4px; margin-right: -4px; }
        .bar-end { border-top-right-radius: 4px; border-bottom-right-radius: 4px; margin-left: -4px; margin-right: 2px; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased relative">

    <button
        id="installButton"
        class="hidden fixed bottom-5 right-5 bg-emerald-600 text-white px-5 py-3 rounded-full shadow-lg font-bold z-50 active:scale-95 transition-all">
        рҹ“ұ м•ұ м„Өм№ҳ
    </button>

    <div id="toast-alert" onclick="dismissToast()" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-[999] bg-gray-900/95 text-white text-sm font-bold px-6 py-4 rounded-2xl shadow-2xl border border-gray-700 cursor-pointer pointer-events-none opacity-0 invisible transition-all duration-300 max-w-xs text-center backdrop-blur-xs">
        <span id="toast-message">кІҪкі  л©”мӢңм§Җ</span>
        <div class="text-[11px] text-gray-400 mt-2 font-normal">(н„°м№ҳ мӢң мҰүмӢң н•ҙм ң)</div>
    </div>

    <div id="page-status" class="max-w-md mx-auto min-h-screen flex flex-col">
        <header class="bg-white border-b border-gray-200 px-4 py-3 flex items-center sticky top-0 z-20">
            <div class="w-24"></div>
            <h2 class="flex-1 text-center text-lg font-bold tracking-tight">м¶ңнғҖ кҙҖлҰ¬ мӢңмҠӨн…ң</h2>
            <div class="w-24 flex justify-end">
                <button onclick="openModal()" class="px-3 py-1.5 bg-emerald-600 text-white font-bold rounded-xl text-xs active:scale-95 transition-all shadow-xs"> м¶ңнғҖ л“ұлЎқ </button>
            </div>
        </header>

       <main class="flex-1 overflow-y-auto">
            <div class="sticky top-0 z-10 bg-white border-b border-gray-100 shadow-xs p-3">
                <div class="max-w-md mx-auto">
                    <nav class="grid grid-cols-3 gap-1 w-full mb-3">
                        <button id="btn-tab-calendar" onclick="switchViewTab('calendar')" class="py-2 rounded-xl font-bold text-xs bg-blue-600 text-white shadow-xs">лӢ¬л Ҙ</button>
                        <button id="btn-tab-list" onclick="switchViewTab('list')" class="py-2 rounded-xl font-bold text-xs bg-gray-100 text-gray-600">мғҒм„ё</button>
                        <button id="btn-tab-weekly" onclick="switchViewTab('weekly')" class="py-2 rounded-xl font-bold text-xs bg-gray-100 text-gray-600">мқҙлІҲмЈј</button>
                    </nav>
            
                    <input type="text" id="search-input" oninput="filterData()" placeholder="м¶ңнғҖмһҗ мқҙлҰ„ кІҖмғү..." 
                           class="w-full p-2 mb-3 border border-gray-200 rounded-lg text-sm">
            
                    <div id="filter-container" class="flex flex-wrap gap-x-2 gap-y-2 text-xs font-bold text-gray-500 px-1">
                        <button onclick="toggleFilter('weekday', this)" class="filter-btn active flex items-center gap-1 bg-blue-100 text-blue-800 px-2 py-1 rounded-lg transition-all duration-200 border border-blue-200">
                            <span class="w-2 h-2 rounded-full color-weekday"></span>нҸүмқјмҷём¶ң
                        </button>
                        <button onclick="toggleFilter('weekend', this)" class="filter-btn active flex items-center gap-1 bg-indigo-100 text-indigo-900 px-2 py-1 rounded-lg transition-all duration-200 border border-indigo-200">
                            <span class="w-2 h-2 rounded-full color-weekend"></span>мЈјл§җмҷём¶ң
                        </button>
                        <button onclick="toggleFilter('overnight', this)" class="filter-btn active flex items-center gap-1 bg-emerald-100 text-emerald-800 px-2 py-1 rounded-lg transition-all duration-200 border border-emerald-200">
                            <span class="w-2 h-2 rounded-full color-overnight"></span>мҷёл°•
                        </button>
                        <button onclick="toggleFilter('vacation', this)" class="filter-btn active flex items-center gap-1 bg-red-100 text-red-800 px-2 py-1 rounded-lg transition-all duration-200 border border-red-200">
                            <span class="w-2 h-2 rounded-full color-vacation"></span>нңҙк°Җ
                        </button>
                    </div>
                </div>
            </div>

            <div class="p-3">
                <section id="view-calendar">
                    <div class="flex justify-between items-center px-4 py-2">
                        <button onclick="changeMonth(-1)" class="w-10 h-10 flex items-center justify-center font-bold text-gray-600 hover:bg-gray-100 rounded-full transition-all">
                            &lt;
                        </button>
        
                        <div id="calendar-title" class="font-bold text-lg"></div>
                        
                        <button onclick="changeMonth(1)" class="w-10 h-10 flex items-center justify-center font-bold text-gray-600 hover:bg-gray-100 rounded-full transition-all">
                            &gt;
                        </button>
                    </div>
                    <div class="bg-white rounded-2xl p-3 shadow-xs border border-gray-200 overflow-hidden">
                        <div id="calendar-grid" class="grid grid-cols-7 gap-y-2 text-sm"></div>
                    </div>
                </section>

            <section id="view-list" class="hidden space-y-6">
                <div>
                    <h3 class="font-extrabold text-emerald-700 text-sm mb-2 flex items-center gap-1">
                        <span class="inline-block w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                        &lt;мҳӨлҠҳмқҳ м¶ңнғҖ&gt;
                    </h3>
                    <div id="today-list" class="space-y-2"></div>
                </div>
                
                <hr class="border-gray-200">

                <div>
                    <h3 class="font-bold text-gray-700 mb-3 text-sm">м „мІҙ м¶ңнғҖ м •ліҙ лӘ…лӢЁ</h3>
                    <div id="integrated-list" class="space-y-2"></div>
                </div>
            </section>
            <section id="view-weekly" class="hidden space-y-3">
                </section>
        </main>
    </div>


    <div id="register-modal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white w-full max-w-sm rounded-2xl p-5 shadow-2xl space-y-4">
            <div class="flex justify-between items-center border-b border-gray-100 pb-2">
                <h3 class="text-lg font-bold text-gray-900">мғҲ м¶ңнғҖ л“ұлЎқ</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-xl font-bold">&times;</button>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-500 mb-1">м¶ңнғҖмһҗ мқҙлҰ„</label>
                <input type="text" id="input-name" placeholder="мқҙлҰ„мқ„ мһ…л Ҙн•ҳм„ёмҡ”" class="w-full px-3 py-2 border border-gray-300 rounded-xl text-sm focus:outline-hidden focus:border-emerald-600">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-500 mb-1">м¶ңнғҖ нҳ•нғң</label>
                <div class="grid grid-cols-2 gap-2 text-xs">
                    <label class="flex items-center gap-2 p-2 border border-gray-200 rounded-lg cursor-pointer hover:bg-gray-50">
                        <input type="checkbox" name="type-group" value="weekday" onclick="handleCheckbox(this)" class="accent-blue-600"> нҸүмқјмҷём¶ң
                    </label>
                    <label class="flex items-center gap-2 p-2 border border-gray-200 rounded-lg cursor-pointer hover:bg-gray-50">
                        <input type="checkbox" name="type-group" value="weekend" onclick="handleCheckbox(this)" class="accent-indigo-900"> мЈјл§җмҷём¶ң
                    </label>
                    <label class="flex items-center gap-2 p-2 border border-gray-200 rounded-lg cursor-pointer hover:bg-gray-50">
                        <input type="checkbox" name="type-group" value="overnight" onclick="handleCheckbox(this)" class="accent-emerald-600"> мҷёл°•
                    </label>
                    <label class="flex items-center gap-2 p-2 border border-gray-200 rounded-lg cursor-pointer hover:bg-gray-50">
                        <input type="checkbox" name="type-group" value="vacation" onclick="handleCheckbox(this)" class="accent-red-500"> нңҙк°Җ
                    </label>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-500 mb-1">м¶ңнғҖ кё°к°„ м„Өм •</label>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <span class="text-[10px] text-gray-400 block">мӢңмһ‘мқј(м¶ңл°ңмқј)</span>
                        <input type="date" id="input-start-date" onchange="syncStartDate(this.value)" class="w-full p-2 border border-gray-300 rounded-lg text-xs">
                    </div>
                    <div class="relative" onclick="handleEndDateClick(event)">
                        <span class="text-[10px] text-gray-400 block">мў…лЈҢмқј(лҸ„м°©мқј)</span>
                        <input type="date" id="input-end-date" class="w-full p-2 border border-gray-300 rounded-lg text-xs disabled:bg-gray-100 disabled:text-gray-400 disabled:cursor-not-allowed">
                    </div>
                </div>
            </div>

            <div class="flex gap-2 pt-2">
                <button onclick="closeModal()" class="flex-1 py-2.5 bg-gray-100 text-gray-600 rounded-xl font-bold text-sm">м·ЁмҶҢ</button>
                <button onclick="submitRegistration()" class="flex-1 py-2.5 bg-emerald-600 text-white rounded-xl font-bold text-sm shadow-xs">л“ұлЎқ мҷ„лЈҢ</button>
            </div>
        </div>
    </div>


    <script>

        const SUPABASE_URL = "https://xlfgksvxqnqvhihfhjfe.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_JX_fqNLdAEbTFmBvDhgrWA_6Z74Gu0r";

        const sb = window.supabase.createClient(
            SUPABASE_URL,
            SUPABASE_ANON_KEY
        );

        let outData = [];
        let currentYear = 2026;
        let currentMonth = 5; 

        let toastQueue = [];
        let isToastActive = false;
        let toastTimer = null;

        function getTodayString() {
            const d = new Date();
            return d.getFullYear() + "-"
                + String(d.getMonth() + 1).padStart(2, "0") + "-"
                + String(d.getDate()).padStart(2, "0");
        }

        async function loadData(){
            const {data,error}=await sb
                .from("outing")
                .select("*")
                .order("start");
            if(error){
                console.error(error);
                return;
            }
            outData=data;
        }

        async function autoPurgeExpiredData() {
            const todayStr = getTodayString();
            await sb
                .from("outing")
                .delete()
                .lt("end", todayStr);
            await loadData();
        }

        function triggerToast(message) {
            toastQueue.push(message);
            processToastQueue();
        }

        function processToastQueue() {
            if (isToastActive || toastQueue.length === 0) return;
            isToastActive = true;

            const message = toastQueue.shift();
            const toast = document.getElementById('toast-alert');
            const msgSpan = document.getElementById('toast-message');
            
            msgSpan.innerText = message;
            toast.classList.remove('opacity-0', 'invisible', 'pointer-events-none');
            toast.classList.add('opacity-100');
            
            toastTimer = setTimeout(() => { dismissToast(); }, 3000);
        }

        function dismissToast() {
            const toast = document.getElementById('toast-alert');
            toast.classList.remove('opacity-100');
            toast.classList.add('opacity-0');
            
            clearTimeout(toastTimer);
            
            setTimeout(() => {
                if(toast.classList.contains('opacity-0')) {
                    toast.classList.add('invisible', 'pointer-events-none');
                }
                isToastActive = false;
                setTimeout(() => { processToastQueue(); }, 100);
            }, 300);
        }

        let scrollPos = {viewCalendar: 0, viewList: 0, viewWeekly: 0};

        function switchViewTab(viewType) {
    // 1. нҳ„мһ¬ мҠӨнҒ¬лЎӨ мң„м№ҳ м ҖмһҘ (мғҲлЎңмҡҙ weekly нғӯк№Ңм§Җ нҸ¬н•Ё)
            const currentView = document.querySelector('section:not(.hidden)');
            if (currentView) {
                scrollPos[currentView.id] = window.scrollY;
            }

            const btnCalendar = document.getElementById('btn-tab-calendar');
            const btnList = document.getElementById('btn-tab-list');
            const btnWeekly = document.getElementById('btn-tab-weekly');
    
            const viewCalendar = document.getElementById('view-calendar');
            const viewList = document.getElementById('view-list');
            const viewWeekly = document.getElementById('view-weekly'); // мғҲлЎң м¶”к°Җн•  м„№м…ҳ ID

    // лІ„нҠј мҠӨнғҖмқј мҙҲкё°нҷ” л°Ҹ м Ғмҡ©
            const btns = [btnCalendar, btnList, btnWeekly];
            btns.forEach(b => b.className = 'py-2 rounded-xl font-bold text-xs bg-gray-100 text-gray-600');
    
            if(viewType === 'calendar') {
                btnCalendar.className = 'py-2 rounded-xl font-bold text-xs bg-blue-600 text-white shadow-xs';
                viewCalendar.classList.remove('hidden'); viewList.classList.add('hidden'); viewWeekly.classList.add('hidden');
                setTimeout(() => window.scrollTo(0, scrollPos.viewCalendar || 0), 50);
                renderCalendar();
            } else if(viewType === 'list') {
                btnList.className = 'py-2 rounded-xl font-bold text-xs bg-blue-600 text-white shadow-xs';
                viewCalendar.classList.add('hidden'); viewList.classList.remove('hidden'); viewWeekly.classList.add('hidden');
                setTimeout(() => window.scrollTo(0, scrollPos.viewList || 0), 50);
                renderListTab();
            } else { // weekly
                btnWeekly.className = 'py-2 rounded-xl font-bold text-xs bg-blue-600 text-white shadow-xs';
                viewCalendar.classList.add('hidden'); viewList.classList.add('hidden'); viewWeekly.classList.remove('hidden');
                setTimeout(() => window.scrollTo(0, scrollPos.viewWeekly || 0), 50);
                renderWeeklyTab();
            }
        }

        let searchQuery = "";

        let activeFilters = new Set(['weekday', 'weekend', 'overnight', 'vacation']);

        function toggleFilter(type, btnElement) {
            const isActive = activeFilters.has(type);
    
            if (isActive) {
                activeFilters.delete(type);
                btnElement.classList.remove('bg-blue-50', 'text-blue-600'); // мҳҲмӢң нҒҙлһҳмҠӨ м ңкұ°
                btnElement.style.opacity = '0.4';
            } else {
                activeFilters.add(type);
                btnElement.classList.add('bg-blue-50', 'text-blue-600');
                btnElement.style.opacity = '1';
            }
            filterData();
        }

        function filterData() {
            searchQuery = document.getElementById('search-input').value.trim().toLowerCase();
    
    // лҚ°мқҙн„° м •м ң
            const filteredData = outData.filter(item => {
                const matchesName = item.name.toLowerCase().includes(searchQuery);
                const matchesType = activeFilters.has(item.type);
                return matchesName && matchesType;
            });

    // лӘЁл“  нғӯм—җ м •м ңлҗң лҚ°мқҙн„° мЈјмһ…
            renderCalendar(filteredData);
            renderListTab(filteredData);
            renderWeeklyTab(filteredData);
        }

        function openModal() { 
            document.getElementById('register-modal').classList.remove('hidden');
            document.getElementById('input-start-date').value = getTodayString();
        }
        function closeModal() { document.getElementById('register-modal').classList.add('hidden'); clearForm(); dismissToast(); }

        function handleCheckbox(checkbox) {
            const checkboxes = document.getElementsByName('type-group');
            checkboxes.forEach((item) => { if (item !== checkbox) item.checked = false; });

            const endDateInput = document.getElementById('input-end-date');
            const startDateValue = document.getElementById('input-start-date').value;

            if (checkbox.checked) {
                if (checkbox.value === 'weekday' || checkbox.value === 'weekend') {
                    endDateInput.disabled = true;
                    if (startDateValue) {
                        endDateInput.value = startDateValue;
                        if(checkbox.value === 'weekday') validateWeekdayDate(startDateValue);
                        if(checkbox.value === 'weekend') validateWeekendOrOvernightDate('weekend', startDateValue);
                    }
                } else if (checkbox.value === 'overnight') {
                    endDateInput.disabled = true;
                    if (startDateValue) {
                        endDateInput.value = getNextDateString(startDateValue);
                        validateWeekendOrOvernightDate('overnight', startDateValue);
                    }
                } else {
                    endDateInput.disabled = false;
                }
            } else {
                endDateInput.disabled = false;
            }
        }

        function getNextDateString(dateStr) {
            const parts = dateStr.split('-');
            const date = new Date(parts[0], parts[1] - 1, parts[2]);
            date.setDate(date.getDate() + 1);
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        }

        function validateWeekdayDate(dateVal) {
            if(!dateVal) return true;
            const parts = dateVal.split('-');
            const dayOfWeek = new Date(parts[0], parts[1] - 1, parts[2]).getDay();
            if (dayOfWeek === 0 || dayOfWeek === 6) {
                triggerToast('нҸүмқјмҷём¶ңмқҖ нҸүмқјм—җл§Ң лӮҳк°Ҳ мҲҳ мһҲмҠөлӢҲлӢӨ.');
                return false;
            }
            return true;
        }

        function validateWeekendOrOvernightDate(type, dateVal) {
            if(!dateVal) return;
            const parts = dateVal.split('-');
            const dayOfWeek = new Date(parts[0], parts[1] - 1, parts[2]).getDay();

            if (type === 'weekend') {
                if (dayOfWeek !== 0 && dayOfWeek !== 6) {
                    triggerToast('мҷём¶ңмқјмқҙ мЈјл§җмқҙ м•„лӢҷлӢҲлӢӨ. нҷ•мқён•ҙмЈјмӢңкё° л°”лһҚлӢҲлӢӨ.');
                }
            } else if (type === 'overnight') {
                if (dayOfWeek !== 6) {
                    triggerToast('мҷёл°•мқјмқҙ мЈјл§җмқҙ м•„лӢҷлӢҲлӢӨ, нҷ•мқён•ҙмЈјмӢңкё° л°”лһҚлӢҲлӢӨ.');
                }
            }
        }

        function syncStartDate(val) {
            if (!val) return;
            const checkedType = document.querySelector('input[name="type-group"]:checked');
            const endDateInput = document.getElementById('input-end-date');
            
            if (checkedType) {
                if (checkedType.value === 'weekday') {
                    endDateInput.value = val;
                    validateWeekdayDate(val);
                } else if (checkedType.value === 'weekend') {
                    endDateInput.value = val;
                    validateWeekendOrOvernightDate('weekend', val);
                } else if (checkedType.value === 'overnight') {
                    endDateInput.value = getNextDateString(val);
                    validateWeekendOrOvernightDate('overnight', val);
                }
            }
        }

        function handleEndDateClick(e) {
            const endDateInput = document.getElementById('input-end-date');
            const checkedType = document.querySelector('input[name="type-group"]:checked');
            
            if (endDateInput.disabled && checkedType) {
                e.preventDefault();
                if (checkedType.value === 'weekday' || checkedType.value === 'weekend') {
                    triggerToast('мҷём¶ңмқҖ н•ҳлЈЁл§Ң лӮҳк°Ҳ мҲҳ мһҲмҠөлӢҲлӢӨ.');
                } else if (checkedType.value === 'overnight') {
                    triggerToast('мҷёл°•мқҖ 1л°• 2мқјл§Ң м„Өм • к°ҖлҠҘн•ҳм—¬ мў…лЈҢмқјмқҙ кі м •лҗ©лӢҲлӢӨ.');
                }
            }
        }

        function changeMonth(direction) {
            currentMonth += direction;
            if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            else if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            renderCalendar();
        }

        // мҙҲкё° кө¬лҸҷ мһҗлҸҷнҷ” мӢӨн–үл¬ё
        window.onload = async function(){
            await loadData();
            autoPurgeExpiredData();
            renderCalendar();
            renderListTab();
            subscribeRealtime();

        };

        function clearForm() {
            document.getElementById('input-name').value = '';
            document.getElementsByName('type-group').forEach(cb => cb.checked = false);
            document.getElementById('input-start-date').value = '';
            const endDate = document.getElementById('input-end-date');
            endDate.value = '';
            endDate.disabled = false;
        }

        async function submitRegistration() {
            const name = document.getElementById('input-name').value.trim();
            const checkedType = document.querySelector('input[name="type-group"]:checked');
            const startDate = document.getElementById('input-start-date').value;
            const endDate = document.getElementById('input-end-date').value;

            if(!name || !checkedType || !startDate || !endDate) {
                alert('лӘЁл“  мһ…л Ҙ н•ӯлӘ©мқ„ л№ м§җм—Ҷмқҙ мұ„мӣҢмЈјм„ёмҡ”.');
                return;
            }
            
            if(new Date(startDate) > new Date(endDate)) {
                triggerToast('лҸ„м°©мқјмқҖ м¶ңл°ңмқјліҙлӢӨ лҠҰм–ҙм•ј н•©лӢҲлӢӨ.');
                return;
            }

            if(checkedType.value === 'weekday' && !validateWeekdayDate(startDate)) return;

            const {error}=await sb
            .from("outing")
            .insert([{
                name:name,
                type:checkedType.value,
                start:startDate,
                end:endDate
            }]);
            if(error){
                alert(error.message);
                return;
            }

            await loadData();
            closeModal();
            
            autoPurgeExpiredData();
            renderCalendar();
            renderListTab();

            triggerToast('м¶ңнғҖк°Җ л“ұлЎқлҗҳм—ҲмҠөлӢҲлӢӨ.');
        }

        function renderCalendar(dataFromFilter) {
            autoPurgeExpiredData();
            const grid = document.getElementById('calendar-grid');
            const title = document.getElementById('calendar-title');
            grid.innerHTML = '';
            title.innerText = `${currentYear}л…„ ${String(currentMonth + 1).padStart(2, '0')}мӣ”`;
    // 1. мҡ”мқј н—ӨлҚ” л ҢлҚ”л§Ғ (мӣ”~мқј мҲңм„ң)
            const daysHeader = ['мӣ”', 'нҷ”', 'мҲҳ', 'лӘ©', 'кёҲ', 'нҶ ', 'мқј'];
            daysHeader.forEach((day, index) => { // indexлҘј л§Өк°ңліҖмҲҳлЎң м¶”к°Җ
                const div = document.createElement('div');
                div.className = 'text-center text-xs font-bold text-gray-400 mb-2';
    
    // indexлҘј нҷңмҡ©н•ҳм—¬ мғүмғҒ м Ғмҡ©
                if (index === 5) {
                        div.classList.remove('text-gray-400');
                        div.classList.add('text-blue-600');
                    }
    // мқјмҡ”мқј(мқёлҚұмҠӨ 6)мқҖ л№Ёк°„мғү нҒҙлһҳмҠӨ м Ғмҡ©
                    if (index === 6) {
                        div.classList.add('text-red-500');
                    }
                div.innerText = day;
                grid.appendChild(div);
            });

    // 2. лӮ м§ң кі„мӮ° (мӣ”мҡ”мқј мӢңмһ‘ ліҙм •)
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const adjustedFirstDay = (firstDay === 0) ? 6 : firstDay - 1; // мқјмҡ”мқј(0)мқ„ 6мңјлЎң, лӮҳлЁём§ҖлҠ” -1
            const lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();
            const prevLastDate = new Date(currentYear, currentMonth, 0).getDate();

            const filteredData = dataFromFilter || outData;

    // 3. мҠ¬лЎҜ л§Өн•‘ (кІ№м№Ё л°©м§Җ)
            const sortedData = [...(dataFromFilter || outData)].sort((a, b) => new Date(a.start) - new Date(b.start));
            const slotMap = new Map();
            sortedData.forEach(item => {
                const usedSlots = new Set();
                sortedData.forEach(other => {
                    if (slotMap.has(other.id) && !(item.end < other.start || item.start > other.end)) {
                        usedSlots.add(slotMap.get(other.id));
                    }
                });
                for (let s = 0; s < 10; s++) {
                    if (!usedSlots.has(s)) {
                        slotMap.set(item.id, s);
                        break;
                    }
                }
            });

    // 4. м•һл¶Җл¶„ л№Ҳ лӮ м§ң мІҳлҰ¬
            for (let i = adjustedFirstDay; i > 0; i--) {
                const dayDiv = document.createElement('div');
                dayDiv.className = 'text-gray-300 min-h-[85px] p-1 border-t border-gray-100 select-none';
                dayDiv.innerText = prevLastDate - i + 1;
                grid.appendChild(dayDiv);
            }

    // 5. лӮ м§ңлі„ л ҢлҚ”л§Ғ
            for (let date = 1; date <= lastDate; date++) {
                const dayDiv = document.createElement('div');
                dayDiv.className = 'min-h-[85px] h-auto p-1 border-t border-gray-100 flex flex-col justify-start pb-2';
        
                const dateNo = document.createElement('div');
                dateNo.className = 'font-semibold text-xs text-left mb-1 px-1';
                dateNo.innerText = date;
        
        // мҡ”мқј кі„мӮ° (0:мқј, 1:мӣ”, ... 6:нҶ )
                const currentDayOfWeek = new Date(currentYear, currentMonth, date).getDay();
                if (currentDayOfWeek === 0) dateNo.classList.add('text-red-500'); // мқјмҡ”мқј л№Ёк°„мғү
                if (currentDayOfWeek === 1) dateNo.classList.remove('text-red-500', 'text-blue-600'); // мӣ”мҡ”мқј кё°ліёмғү
                if (currentDayOfWeek === 6) dateNo.classList.add('text-blue-600');
                dayDiv.appendChild(dateNo);

                const checkStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(date).padStart(2, '0')}`;
                const filteredData = dataFromFilter || outData;
                const todaysOutings = filteredData.filter(item => checkStr >= item.start && checkStr <= item.end)
                                 .sort((a, b) => (slotMap.get(a.id) ?? 0) - (slotMap.get(b.id) ?? 0));

                let currentSlot = 0;
                todaysOutings.forEach(item => {
                    const itemSlot = slotMap.get(item.id) ?? 0;
                    while (currentSlot < itemSlot) {
                        const emptyRow = document.createElement('div');
                        emptyRow.className = 'h-[16px] mb-0.5 w-full';
                        dayDiv.appendChild(emptyRow);
                        currentSlot++;
                    }

                    const row = document.createElement('div');
                    row.className = 'h-[16px] mb-0.5 w-full';
                    const bar = document.createElement('div');
                    bar.className = `schedule-bar color-${item.type}`;
            
            // мқҙлҰ„ н‘ңмӢң лЎңм§Ғ
                    if (checkStr === item.start || currentDayOfWeek === 1) bar.innerText = item.name;
            
                    if (item.start === item.end) bar.classList.add('bar-single');
                    else if (checkStr === item.start) bar.classList.add('bar-start');
                    else if (checkStr === item.end) bar.classList.add('bar-end');
                    else bar.classList.add('bar-mid');
            
                    row.appendChild(bar);
                    dayDiv.appendChild(row);
                    currentSlot++;
                });
                grid.appendChild(dayDiv);
            }
        }

        function createDayCell(date, isCurrentMonth) {
            const dayDiv = document.createElement('div');
            dayDiv.className = 'min-h-[85px] p-1 border-t border-gray-100 flex flex-col relative';
            
            const dateNo = document.createElement('div');
            dateNo.className = `font-semibold text-xs mb-1 px-1 ${!isCurrentMonth ? 'text-gray-300' : ''}`;
            dateNo.innerText = date;
            dayDiv.appendChild(dateNo);

            if (isCurrentMonth) {
                const checkStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(date).padStart(2, '0')}`;
                
                // 1. н•ҙлӢ№ лӮ м§ңм—җ нҸ¬н•ЁлҗҳлҠ” лӘЁл“  м¶ңнғҖлҘј к°Җм ёмҳҙ
                let todaysOutings = outData.filter(item => checkStr >= item.start && checkStr <= item.end);
                
                // 2. м •л ¬ (start лӮ м§ңк°Җ л№ лҘё мҲңм„ңлҢҖлЎң м •л ¬н•ҳл©ҙ мӨ„мқҙ м—үнӮӨм§Җ м•ҠмқҢ)
                todaysOutings.sort((a, b) => new Date(a.start) - new Date(b.start));

                // 3. 4к°ңмқҳ кі м • мҠ¬лЎҜмқ„ мҲңм„ңлҢҖлЎң мұ„мӣҖ
                for (let i = 0; i < 4; i++) {
                    const row = document.createElement('div');
                    row.className = 'h-[16px] mb-0.5 w-full';
                    
                    const item = todaysOutings[i];
                    if (item) {
                        const bar = document.createElement('div');
                        bar.className = `schedule-bar color-${item.type}`;
                        
                        if (checkStr === item.start) {
                            bar.innerText = item.name;
                        }

                        if (item.start === item.end) bar.classList.add('bar-single');
                        else if (checkStr === item.start) bar.classList.add('bar-start');
                        else if (checkStr === item.end) bar.classList.add('bar-end');
                        else bar.classList.add('bar-mid');
                        
                        row.appendChild(bar);
                    }
                    dayDiv.appendChild(row);
                }
            }
            return dayDiv;
        }
        function getWeeklyRange() {
            const now = new Date();
            const day = now.getDay();
            const diff = now.getDate() - day + (day === 0 ? -6 : 1);
            const monday = new Date(now.setDate(diff));
            const sunday = new Date(monday);
            sunday.setDate(monday.getDate() + 6);
            return {
                start: monday.toISOString().split('T')[0],
                end: sunday.toISOString().split('T')[0]
            };
        }

        function renderWeeklyTab(dataFromFilter) {
            const weeklyRange = getWeeklyRange();
            const weeklyContainer = document.getElementById('view-weekly');
            weeklyContainer.innerHTML = '<h3 class="font-bold text-sm mb-3 px-2">мқҙлІҲ мЈј м¶ңнғҖ нҳ„нҷ©</h3>';

            const typeBgClasses = { weekday:'color-weekday', weekend:'color-weekend', overnight:'color-overnight', vacation:'color-vacation' };
            const typeNames = { weekday: 'нҸүмқјмҷём¶ң', weekend: 'мЈјл§җмҷём¶ң', overnight: 'мҷёл°•', vacation: 'нңҙк°Җ' };

            const filteredData = (dataFromFilter || outData).filter(item => {
                    const matchesWeek = (item.start >= weeklyRange.start && item.start <= weeklyRange.end);
                    return matchesWeek; // searchQueryмҷҖ activeFiltersлҠ” мқҙлҜё filterData()м—җм„ң мІҳлҰ¬лҗЁ
                });

            if (filteredData.length === 0) {
                weeklyContainer.innerHTML += '<div class="text-center py-10 text-gray-400 text-sm">мқҙлІҲ мЈј мӢңмһ‘лҗҳлҠ” м¶ңнғҖк°Җ м—ҶмҠөлӢҲлӢӨ.</div>';
                return;
            }

            filteredData.forEach(item => {
               let displayLabel = typeNames[item.type];
                if (item.type === 'vacation') displayLabel = 'нңҙк°Җм¶ңл°ң';
                else if (item.type === 'overnight') displayLabel = 'мҷёл°•м¶ңл°ң';

        // н•өмӢ¬ мҲҳм •: нҸүмқј/мЈјл§җ мҷём¶ңмқҖ лӮ м§ңл§Ң, лӮҳлЁём§ҖлҠ” кё°к°„ н‘ңмӢң
                const displayPeriod = (item.type === 'weekday' || item.type === 'weekend') 
                    ? `мқјмӢң: ${item.start}` 
                    : `кё°к°„: ${item.start} ~ ${item.end}`;

                weeklyContainer.innerHTML += `
                    <div class="p-4 bg-white rounded-xl shadow-xs flex justify-between items-center text-sm mb-2 mx-3 border border-gray-100">
                        <div>
                            <p class="font-bold text-gray-900 text-base">${item.name}</p>
                            <p class="text-xs text-gray-500 mt-1">${displayPeriod}</p>
                        </div>
                        <span class="px-3 py-1 rounded-lg text-xs font-black text-white ${typeBgClasses[item.type]}" style="color: #ffffff !important;">
                            ${displayLabel}
                        </span>
                    </div>`;
            });
        }

        function renderListTab(dataFromFilter) {
            autoPurgeExpiredData(); 

    // н•„н„°л§Ғлҗң лҚ°мқҙн„° мӮ¬мҡ©
            const filteredData = dataFromFilter || outData;

            const todayContainer = document.getElementById('today-list');
            const integratedContainer = document.getElementById('integrated-list');

            todayContainer.innerHTML = '';
            integratedContainer.innerHTML = '';

            const todayStr = getTodayString();
            const typeBgClasses = { weekday:'color-weekday', weekend:'color-weekend', overnight:'color-overnight', vacation:'color-vacation' };
            const typeNames = { weekday:'нҸүмқјмҷём¶ң', weekend:'мЈјл§җмҷём¶ң', overnight:'мҷёл°•', vacation:'нңҙк°Җ' };

            let todayElementsCount = 0;

            filteredData.forEach((item) => {
                let statusLabel = '';
                if (item.type === 'vacation') {
                    if (item.start === todayStr) statusLabel = 'нңҙк°Җм¶ңл°ң';
                    else if (item.end === todayStr) statusLabel = 'нңҙк°Җліөк·Җ';
                } else if (item.type === 'overnight') {
                    if (item.start === todayStr) statusLabel = 'мҷёл°•м¶ңл°ң';
                    else if (item.end === todayStr) statusLabel = 'мҷёл°•ліөк·Җ';
                } else if (item.type === 'weekday' && item.start === todayStr) {
                    statusLabel = 'нҸүмқјмҷём¶ң';
                } else if (item.type === 'weekend' && item.start === todayStr) {
                    statusLabel = 'мЈјл§җмҷём¶ң';
                }

                if (statusLabel) {
                    todayElementsCount++;
                    todayContainer.innerHTML += `
                        <div class="p-3.5 rounded-xl shadow-xs flex justify-between items-center text-sm bg-amber-50">
                            <div>
                                <p class="font-bold text-gray-900 text-base">${item.name}</p>
                                <p class="text-[11px] text-gray-500 mt-0.5">кё°к°„: ${item.start} ~ ${item.end}</p>
                            </div>
                            <span class="px-3 py-1 rounded-lg text-xs font-black text-white ${typeBgClasses[item.type]}" style="color: #ffffff !important;">
                                ${statusLabel}
                            </span>
                        </div>`;
                }
            });

            if (todayElementsCount === 0) {
                todayContainer.innerHTML = `<div class="text-center py-4 text-xs text-gray-400 bg-gray-50 rounded-xl border-2 border-dashed border-gray-200">мҳӨлҠҳ ліҖлҸҷлҗҳлҠ” м¶ңнғҖмһҗк°Җ м—ҶмҠөлӢҲлӢӨ.</div>`;
            }

            if(filteredData.length === 0) {
                integratedContainer.innerHTML = `<div class="text-center py-12 text-sm text-gray-400">кІҖмғү кІ°кіјк°Җ м—ҶмҠөлӢҲлӢӨ.</div>`;
            } else {
                const sortedData = [...filteredData].sort((a, b) => new Date(a.start) - new Date(b.start));
                sortedData.forEach(item => {
                    const displayPeriod = (item.type === 'weekday' || item.type === 'weekend') 
                        ? `мқјмӢң: ${item.start}` 
                        : `кё°к°„: ${item.start} ~ ${item.end}`;
                    integratedContainer.innerHTML += `
                        <div class="p-4 bg-white rounded-xl shadow-xs flex justify-between items-center text-sm mb-2 border border-gray-100">
                            <div>
                                <p class="font-bold text-gray-900 text-base">${item.name}</p>
                                <p class="text-xs text-gray-500 mt-1">${displayPeriod}</p>
                            </div>
                            <span class="px-3 py-1 rounded-lg text-xs font-black text-white ${typeBgClasses[item.type]}" style="color: #ffffff !important;">
                                ${typeNames[item.type]}
                            </span>
                        </div>`;
                });
            }
        }

        function subscribeRealtime() {
            sb
                .channel("outing-channel")
                .on(
                    "postgres_changes",
                    {
                        event: "*",
                        schema: "public",
                        table: "outing"
                    },
                    async () => {
                        await loadData();
                        renderCalendar();
                        renderListTab();
                    }
                )
                .subscribe();
        }
    </script>

    <script>

    let deferredPrompt = null;
    const installButton = document.getElementById("installButton");
    function isStandalone() {
        return window.matchMedia("(display-mode: standalone)").matches
            || window.navigator.standalone === true;
    }

    function isIOS() {
        return /iphone|ipad|ipod/i.test(navigator.userAgent);
    }
    window.addEventListener("beforeinstallprompt", (e) => {
        e.preventDefault();
        deferredPrompt = e;
        if (!isStandalone()) {
            installButton.classList.remove("hidden");
        }

    });


    installButton.addEventListener("click", async () => {

        if (isIOS()) {

            alert(
    `м•„мқҙнҸ°м—җм„ңлҠ”
    Safari н•ҳлӢЁмқҳ кіөмң , 'нҷҲ нҷ”л©ҙм—җ м¶”к°Җ'
    лҘј лҲҢлҹ¬ м„Өм№ҳн•  мҲҳ мһҲмҠөлӢҲлӢӨ.`
            );
            return;
        }
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
        deferredPrompt = null;
    });

    window.addEventListener("appinstalled", () => {
        installButton.classList.add("hidden");
        console.log("м•ұ м„Өм№ҳ мҷ„лЈҢ");
    });
    // мІҳмқҢ мӢӨн–ү мӢң
    window.addEventListener("load", () => {
        if (isStandalone()) {
            installButton.classList.add("hidden");
        }
    });

    </script>

    <script>
    if ("serviceWorker" in navigator) {
        window.addEventListener("load", async () => {
            const registration = await navigator.serviceWorker.register("./service-worker.js");
            console.log("Service Worker л“ұлЎқ мҷ„лЈҢ");
            registration.addEventListener("updatefound", () => {
                const newWorker = registration.installing;
                newWorker.addEventListener("statechange", () => {
                    if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
                        if (confirm("мғҲ лІ„м „мқҙ мһҲмҠөлӢҲлӢӨ.\nм§ҖкёҲ м—…лҚ°мқҙнҠён•ҳмӢңкІ мҠөлӢҲк№Ң?")) {
                            window.location.reload();
                        }
                    }
                });
            });
        });
    }
    </script>
